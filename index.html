            <!-- Element Name -->

            <span id="element-text" data-hide=true>Element : </span>

            <hr data-hide=true>

            <!-- Position & Delete -->

            <div class="field flex jcsb aic">
                <label for="x-pos">Horizontal Position (X)</label>
                <input class="w-6rem" name="x-pos" id="x-pos" type="number" step="0.1" readonly />

                <label for="y-pos">Vertical Position (Y)</label>

            </div>

                <label for="delete-btn">Delete Element?</label>

            <!-- Text & Image Content -->

            <div class="field">
                <label class="block label-margin-bottom" for="text-content">Text Content</label>
                <textarea class="block w-100p" name="text-content" id="text-content" rows="3" readonly></textarea>
                <hr data-hide=true>
            </div>

                <span class="block label-margin-bottom">Replace Image</span>

                    <input class="inline" name="image-upload" id="image-upload" type="file" readonly/>
                </div>

                <hr data-hide=true>
            </div>

            <!-- Element Properties -->

            <div class="field flex jcsb aic">
                <label for="font-size">Font Size</label>
                <input class="w-6rem" name="font-size" id="font-size" type="number" step="0.1"  readonly />
            </div>
            <div class="field flex jcsb aic">
                <label for="letter-spacing">Line Spacing</label>
                <input class="w-6rem" name="letter-spacing" id="letter-spacing" type="number" step="0.1"  readonly />
            </div>
            <div class="field flex jcsb aic">
                <label for="font-color">Font Color</label>
                <input class="w-6rem" name="font-color" id="font-color" type="color" value="#0F0F0F" readonly />
            </div>
            <div class="field flex jcsb aic">
                <label for="fill-color">Fill Color</label>
                <input class="w-6rem" name="fill-color" id="fill-color" type="color" value="#0F0F0F" readonly />
            </div>
            <div class="field flex jcsb aic">
                <label for="transform-scale">Scale</label>
                <input class="w-6rem" name="transform-scale" id="transform-scale" type="number" step="1" readonly/>
            </div>

        </aside>
    </main>
    <div id="select-box"></div>
